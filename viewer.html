<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ApplySure - Resume Viewer</title>
    <link rel="stylesheet" href="resume.css">
</head>

<body>

    <div class="action-header">
        <div class="action-brand">ApplySure - Job Ready Resume</div>
        <div style="display:flex;gap:0.5rem;align-items:center;">
            <!-- Edit Mode toolbar (shown only in edit mode) -->
            <div id="edit-toolbar" style="display:none;align-items:center;gap:0.5rem;">
                <button id="btn-page-break" class="action-btn" style="background:#7c3aed;" title="Insert a page break at the cursor position">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16M4 12h16" />
                    </svg>
                    Insert Page Break
                </button>
                <button id="btn-edit-done" class="action-btn" style="background:#059669;">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    Done Editing
                </button>
            </div>
            <button id="btn-edit" class="action-btn" style="background:#d97706;">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
                Edit
            </button>
            <button id="btn-download" class="action-btn">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Download PDF
            </button>
            <button id="btn-print" class="action-btn" style="background:#374151;">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                </svg>
                Print
            </button>
        </div>
    </div>

    <div class="page-container">
        <div id="resume-page" class="page">
            <!-- Content injected by viewer.js -->
            <p style="text-align: center; color: #666; margin-top: 2rem;">Loading resume...</p>
        </div>
    </div>

    <script src="viewer.js"></script>
</body>

</html>
